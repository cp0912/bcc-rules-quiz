<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script src="quiz-data.js"></script>

<style>
  :root {
    --navy: #7ec870;
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --cream: #F7F4EE;
    --green: #1A6B4A;
    --green-light: #E4F2EC;
    --red: #8B2020;
    --red-light: #FAE8E8;
    --white: #C8A96A;
    --text: #000000;
    --muted: #111111;
    --border: #DDD8CC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; max-width: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 1.5rem;
  }
  /* Header */
  .site-header {
    width: 100%;
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .header-logo { width: 48px; height: 48px; flex-shrink: 0; }
  .header-logo img { width: 48px; height: 48px; object-fit: contain; }
  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700;
    color: #000000; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .header-text p { font-size: 12px; color: #000000; margin-top: 2px; }
  .header-text p a { color: #FFFFFF; text-decoration: underline; text-underline-offset: 2px; font-weight: 600; }
  .header-text p a:hover { color: #F0D080; }
  /* Card */
  .card {
    background: var(--white);
    border-radius: 12px;
    width: calc(100% - 2rem); max-width: 660px;
    margin: 0 1rem;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  }
  .progress-track { height: 5px; background: var(--border); }
  .progress-fill { height: 5px; background: var(--gold); transition: width 0.4s ease; }
  .card-body { padding: 1.25rem 1.5rem 1.25rem; }
  /* Start screen */
  .start-screen { padding: 2.5rem 2rem; text-align: center; }
  .start-icon { width: 80px; height: 80px; margin: 0 auto 1.25rem; }
  .start-icon img { width: 60px; height: 60px; object-fit: contain; }
  .start-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text); margin-bottom: 0.4rem;
  }
  .start-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 2rem; line-height: 1.5; }
  .start-label {
    font-size: 13px; font-weight: 600; color: var(--text);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 0.6rem; display: block;
  }
  .start-select-wrap { position: relative; display: inline-block; margin-bottom: 1rem; }
  .start-select {
    appearance: none;
    background: var(--white);
    border: 2px solid var(--navy);
    border-radius: 8px;
    padding: 12px 44px 12px 18px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px; font-weight: 600;
    color: #000000;
    cursor: pointer;
    min-width: 200px;
    text-align: center;
  }
  .start-select:focus { outline: none; border-color: var(--gold); }
  .start-select-arrow {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none; color: #000000; font-size: 12px;
  }
  .category-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1rem; }
  .cat-tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 99px;
    background: #D6EBDA; color: var(--navy);
    cursor: pointer; border: 1.5px solid transparent;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .cat-tag:hover { background: #B8D9BE; }
  .cat-tag.active { background: var(--navy); color: #000000; border-color: var(--gold); }
  /* Meta row */
  .q-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .section-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: #ffffff; background: #1a5c2e; padding: 3px 10px; border-radius: 99px;
  }
  .q-counter { font-size: 12px; color: var(--muted); }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.55; color: var(--text); margin-bottom: 1.5rem; }
  /* Options */
  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; background: var(--white); text-align: left;
    transition: border-color 0.15s, background 0.15s;
    font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 600; line-height: 1.45; color: #000000; width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--gold); background: #F5ECCC; }
  .opt:disabled { cursor: default; }
  .opt-letter {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: var(--cream); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--muted); margin-top: 1px;
    transition: background 0.15s, color 0.15s;
  }
  .opt.correct { border-color: var(--green); background: var(--green-light); }
  .opt.correct .opt-letter { background: var(--green); color: white; }
  .opt.wrong { border-color: var(--red); background: var(--red-light); }
  .opt.wrong .opt-letter { background: var(--red); color: white; }
  .feedback {
    margin-top: 1.25rem; padding: 13px 15px; border-radius: 8px;
    font-size: 14px; line-height: 1.6; display: none;
    max-height: 120px; overflow-y: auto;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-light); border: 1px solid #9ECFB8; color: #000000; }
  .feedback.wrong   { background: var(--red-light);   border: 1px solid #DCAAA9; color: #000000; }
  .feedback strong  { display: block; margin-bottom: 4px; font-size: 15px; }
  .card-footer { border-top: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: flex-end; }
  .btn-next, .btn-start {
    display: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--navy); color: #000000;
    border: none; border-radius: 7px; padding: 11px 28px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-next:hover, .btn-start:hover { background: #68b85a; }
  .btn-next.show, .btn-start.show { display: block; }
  .btn-start-center {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--navy); color: #000000;
    border: none; border-radius: 8px; padding: 14px 40px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-start-center:hover { background: #68b85a; }
  /* Score */
  .score-screen { padding: 1.5rem 1.5rem 1.5rem; text-align: center; }
  .score-dial {
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--navy); border: 4px solid var(--gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .score-num { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; color: #000000; line-height: 1; }
  .score-denom { font-size: 12px; color: #000000; margin-top: 2px; }
  .score-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
  .score-msg { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
  .review-heading { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); text-align: left; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
  .review-item { border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; margin-bottom: 10px; text-align: left; }
  .review-item .q-meta { margin-bottom: 5px; }
  .review-q { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 8px; line-height: 1.45; }
  .review-ans { font-size: 12px; line-height: 1.6; }
  .review-ans .wrong-line { color: var(--red); }
  .review-ans .right-line { color: var(--green); font-weight: 500; }
  .review-ans .explain-line { color: #000000; margin-top: 4px; }
  .btn-retry {
    font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; background: var(--navy); color: #000000;
    border: none; border-radius: 7px; padding: 11px 32px; cursor: pointer; margin-top: 1.5rem; transition: background 0.15s;
  }
  .btn-retry:hover { background: #1a2f66; }
  @media (max-width: 500px) {
    .site-header { padding: 0.75rem 1rem; }
    .header-logo { width: 36px; height: 36px; }
    .header-logo img { width: 36px; height: 36px; }
    .header-text h1 { font-size: 16px; }
    .header-text p { font-size: 11px; }
    .card { width: calc(100% - 1rem); margin: 0 0.5rem; }
    .card-body { padding: 1rem 1rem 1rem; }
    .card-footer { padding: 0.6rem 1rem; }
    .q-text { font-size: 14px; }
    .opt {
      font-size: 15px; padding: 8px 12px;
      font-weight: 700 !important;
      color: #000000 !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .opt-letter { width: 22px; height: 22px; font-size: 11px; }
    .start-screen { padding: 1rem 1rem; }
    .score-screen { padding: 1rem 1rem; }
    .btn-start-center { padding: 11px 28px; font-size: 14px; }
  }

  /* ── Navy & Gold Theme ───────────────────────────────────── */
  body.theme-navy {
    --navy: #0D1B3E;
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --white: #0D1B3E;
    --text: #F0D080;
    --muted: #C9A84C;
    --border: #2A3F6F;
  }
  body.theme-navy .site-header { background: #070E21; border-bottom-color: var(--gold); }
  body.theme-navy .header-text h1 { color: #F0D080; }
  body.theme-navy .header-text p a { color: #C9A84C; }
  body.theme-navy .header-text p a:hover { color: #F0D080; }
  body.theme-navy .card { background: #0D1B3E; box-shadow: 0 8px 40px rgba(0,0,0,0.5); border: 0.5px solid #2A3F6F; }
  body.theme-navy .progress-track { background: #1A2F5A; }
  body.theme-navy .progress-fill { background: var(--gold); }
  body.theme-navy .card-footer { border-top-color: #2A3F6F; }
  body.theme-navy .q-text { color: #F0D080; }
  body.theme-navy .q-counter { color: #C9A84C; }
  body.theme-navy .opt { background: #132244; border-color: #2A3F6F; color: #F0D080 !important; }
  body.theme-navy .opt:hover:not(:disabled) { background: #1A2F5A; border-color: var(--gold); }
  body.theme-navy .opt.correct { background: #0D2E1F; border-color: #4ADE80; color: #FFFFFF; }
  body.theme-navy .opt.correct .opt-letter { background: #4ADE80; color: #000000; }
  body.theme-navy .opt.wrong { background: #2E0D0D; border-color: #F87171; color: #FFFFFF; }
  body.theme-navy .opt.wrong .opt-letter { background: #F87171; color: #000000; }
  body.theme-navy .opt-letter { background: #1A2F5A; color: #F0D080; }
  body.theme-navy .feedback.correct { background: #0D2E1F; border-color: #4ADE80; color: #FFFFFF; }
  body.theme-navy .feedback.wrong { background: #2E0D0D; border-color: #F87171; color: #FFFFFF; }
  body.theme-navy .section-badge { background: var(--gold); color: #0D1B3E; }
  body.theme-navy .start-screen { color: #F0D080; }
  body.theme-navy .start-title { color: #F0D080; }
  body.theme-navy .start-subtitle { color: #C9A84C; }
  body.theme-navy .start-label { color: #C9A84C; }
  body.theme-navy .start-select { background: #132244; color: #F0D080; border-color: #2A3F6F; }
  body.theme-navy .start-select-arrow { color: #C9A84C; }
  body.theme-navy .cat-tag { background: #132244; color: #C9A84C; border-color: #2A3F6F; }
  body.theme-navy .cat-tag:hover { background: #1A2F5A; }
  body.theme-navy .cat-tag.active { background: var(--gold); color: #0D1B3E; border-color: var(--gold); }
  body.theme-navy .btn-start-center,
  body.theme-navy .btn-next,
  body.theme-navy .btn-start,
  body.theme-navy .btn-retry { background: var(--gold); color: #0D1B3E; }
  body.theme-navy .btn-start-center:hover,
  body.theme-navy .btn-next:hover,
  body.theme-navy .btn-start:hover,
  body.theme-navy .btn-retry:hover { background: var(--gold-light); }
  body.theme-navy .score-dial { background: #070E21; border-color: var(--gold); }
  body.theme-navy .score-num { color: #F0D080; }
  body.theme-navy .score-denom { color: #C9A84C; }
  body.theme-navy .score-title { color: #F0D080; }
  body.theme-navy .score-msg { color: #C9A84C; }
  body.theme-navy .review-item { border-color: #2A3F6F; background: #132244; }
  body.theme-navy .review-q { color: #F0D080; }
  body.theme-navy .review-ans .wrong-line { color: #F87171; }
  body.theme-navy .review-ans .right-line { color: #4ADE80; }
  body.theme-navy .review-ans .explain-line { color: #C9A84C; }
  body.theme-navy .review-heading { color: #F0D080; border-bottom-color: #2A3F6F; }

  /* ── Dark Mode Theme ─────────────────────────────────────── */
  body.theme-dark {
    --navy: #000000;
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --white: #000000;
    --text: #FFFFFF;
    --muted: #CCCCCC;
    --border: #444444;
    --green: #1A6B4A;
    --green-light: #0D2E1F;
    --red: #8B2020;
    --red-light: #2E0D0D;
  }
  body.theme-dark .site-header { background: #111111; border-bottom-color: var(--gold); }
  body.theme-dark .card { background: #111111; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  body.theme-dark .opt { background: #1a1a1a; border-color: #555555; color: #FFFFFF; }
  body.theme-dark .opt:hover:not(:disabled) { background: #2a2a2a; border-color: var(--gold); }
  /* Correct answer — bright green background, black text, vivid letter badge */
  body.theme-dark .opt.correct { background: #1A7A40; border-color: #4ADE80; color: #FFFFFF; }
  body.theme-dark .opt.correct .opt-letter { background: #4ADE80; color: #000000; }
  /* Wrong answer — bright red background, white text, vivid letter badge */
  body.theme-dark .opt.wrong { background: #7A1A1A; border-color: #F87171; color: #FFFFFF; }
  body.theme-dark .opt.wrong .opt-letter { background: #F87171; color: #000000; }
  /* Unselected letters stay visible */
  body.theme-dark .opt-letter { background: #333333; color: #FFFFFF; }
  /* Feedback boxes — high contrast */
  body.theme-dark .feedback.correct { background: #1A7A40; border-color: #4ADE80; color: #FFFFFF; }
  body.theme-dark .feedback.wrong { background: #7A1A1A; border-color: #F87171; color: #FFFFFF; }
  body.theme-dark .progress-track { background: #333333; }
  body.theme-dark .card-footer { border-top-color: #333333; }
  body.theme-dark .review-item { border-color: #444444; background: #1a1a1a; }
  body.theme-dark .review-ans .wrong-line { color: #FF6B6B; }
  body.theme-dark .review-ans .right-line { color: #6BFF9E; }
  body.theme-dark .score-dial { background: #111111; border-color: var(--gold); }
  body.theme-dark .start-select { background: #1a1a1a; color: #FFFFFF; border-color: #444444; }
  body.theme-dark .btn-start-center,
  body.theme-dark .btn-next,
  body.theme-dark .btn-start,
  body.theme-dark .btn-retry { background: var(--gold); color: #000000; }
  body.theme-dark .btn-start-center:hover,
  body.theme-dark .btn-next:hover,
  body.theme-dark .btn-start:hover,
  body.theme-dark .btn-retry:hover { background: var(--gold-light); }
  body.theme-dark .start-select-arrow { color: #CCCCCC; }
  body.theme-dark .section-badge { background: #1A6B4A; color: #FFFFFF; }
  body.theme-dark .cat-tag { background: #1a1a1a; color: #CCCCCC; border-color: #444444; }
  body.theme-dark .cat-tag:hover { background: #2a2a2a; }
  body.theme-dark .cat-tag.active { background: var(--gold); color: #000000; border-color: var(--gold); }
</style>
</head>

<script>
// ── Populate header from config ──────────────────────────────
document.title = QUIZ_CONFIG.title;

const siteLink = document.getElementById('site-link');
siteLink.textContent = QUIZ_CONFIG.linkText;

// ── Theme management ─────────────────────────────────────────
function applyTheme(theme, save) {
  document.body.classList.remove('theme-dark', 'theme-cricket', 'theme-navy');
  if (theme === 'dark') document.body.classList.add('theme-dark');
  if (theme === 'navy') document.body.classList.add('theme-navy');
  if (save) localStorage.setItem('bcc-quiz-theme', theme);
  // Sync dropdown if it exists
  const sel = document.getElementById('theme-select');
  if (sel) sel.value = theme;
}

function loadTheme() {
  const saved = localStorage.getItem('bcc-quiz-theme');
  if (saved) {
    // User has previously chosen a theme — respect it
    applyTheme(saved, false);
  } else {
    // No saved preference — pick based on local time
    // Dark mode: 7pm (19:00) to 6am (06:00); Cricket Ground: daytime
    const hour = new Date().getHours();
    const auto = (hour >= 19 || hour < 6) ? 'dark' : 'cricket';
    applyTheme(auto, false);
  }
}

loadTheme();


// ── Loaded from quiz-data.js ──
const ALL_Q = QUIZ_CONFIG.questions;
const CATEGORIES = [...new Set(ALL_Q.map(q => q.s))];
let activeCategories = new Set(CATEGORIES);

let Q = [], cur = 0, score = 0, answered = false, results = [];
const LETTERS = ['A','B','C','D'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toggleCategory(cat, el) {
  if (activeCategories.has(cat)) {
    activeCategories.delete(cat);
    el.classList.remove('active');
  } else {
    activeCategories.add(cat);
    el.classList.add('active');
  }
  updateDropdown();
}

function onDropdownChange(sel) {
  const pool = getFilteredPool();
  const total = pool.length;
  if (parseInt(sel.value) === total) {
    // "All" selected — activate all categories
    activeCategories = new Set(CATEGORIES);
    document.querySelectorAll('.cat-tag').forEach(el => el.classList.add('active'));
    updateDropdown();
  }
}

function updateDropdown() {
  const pool = getFilteredPool();
  const total = pool.length;
  const sel = document.getElementById('q-count');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = '';
  const opts = [5, 10].filter(n => n < total);
  opts.forEach(n => {
    const o = document.createElement('option');
    o.value = n;
    o.textContent = n + ' Questions';
    if (String(n) === current) o.selected = true;
    sel.appendChild(o);
  });
  const all = document.createElement('option');
  all.value = total;
  all.textContent = 'All ' + total + ' Questions';
  if (current === String(total) || !opts.includes(parseInt(current))) all.selected = true;
  sel.appendChild(all);
}

function getFilteredPool() {
  if (activeCategories.size === 0) return ALL_Q;
  return ALL_Q.filter(q => activeCategories.has(q.s));
}

function allCategoriesSelected() {
  return CATEGORIES.every(c => activeCategories.has(c));
}

function pickQuestions(n) {
  const pool = getFilteredPool();
  if (n >= pool.length) return shuffle(pool);
  // Use pool instead of ALL_Q for groups
  const allQ = pool;
  // Group by section
  const groups = {};
  allQ.forEach(q => {
    if (!groups[q.s]) groups[q.s] = [];
    groups[q.s].push(q);
  });
  const sections = Object.keys(groups);
  const result = [];
  // Guarantee at least 1 from each section if possible
  sections.forEach(s => {
    const shuffled = shuffle(groups[s]);
    result.push(shuffled[0]);
  });
  // Fill remaining slots with random picks from remaining questions
  const remaining = allQ.filter(q => !result.includes(q));
  const extra = shuffle(remaining);
  let i = 0;
  while (result.length < n && i < extra.length) {
    result.push(extra[i++]);
  }
  return shuffle(result.slice(0, n));
}

function pct() { return Q.length ? Math.round((cur / Q.length) * 100) : 0; }

function startQuiz() {
  const n = parseInt(document.getElementById('q-count').value);
  Q = pickQuestions(n);
  cur = 0; score = 0; answered = false; results = [];
  render();
}

function render() {
  document.getElementById('progress').style.width = pct() + '%';
  const root = document.getElementById('quiz-root');
  if (cur >= Q.length) { renderScore(root); return; }
  const q = Q[cur];
  root.innerHTML = `
    <div class="card-body">
      <div class="q-meta">
        <span class="q-counter">${cur + 1} / ${Q.length}</span>
      </div>
      <p class="q-text">${q.q}</p>
      <div class="options" id="opts">
        ${q.opts.map((o,i) => `
          <button class="opt" id="opt${i}" onclick="choose(${i})">
            <span class="opt-letter">${LETTERS[i]}</span>
            <span>${o}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
    </div>
    <div class="card-footer">
      <button class="btn-next" id="nxt" onclick="next()">
        ${cur === Q.length - 1 ? 'See Results →' : 'Next Question →'}
      </button>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = Q[cur];
  const correct = i === q.ans;
  if (correct) score++;
  for (let j = 0; j < 4; j++) {
    const b = document.getElementById('opt' + j);
    b.disabled = true;
    if (j === q.ans) b.classList.add('correct');
    else if (j === i) b.classList.add('wrong');
  }
  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = `<strong>${correct ? '✅ Correct!' : '❌ Incorrect.'}</strong>${q.ex}`;
  document.getElementById('nxt').classList.add('show');
  results.push({ s: q.s, q: q.q, correct, your: q.opts[i], right: q.opts[q.ans], ex: q.ex });
}

function next() {
  cur++; answered = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderScore(root) {
  document.getElementById('progress').style.width = '100%';
  const p = Math.round((score / Q.length) * 100);
  const msg = p === 100 ? 'Perfect — you know the rulebook cold!' :
               p >= 75  ? 'Great work. Nearly there!' :
               p >= 50  ? 'Decent effort. A quick re-read will sharpen things up.' :
                          'Time to revisit the rulebook before the next match.';
  const wrongs = results.filter(r => !r.correct);
  const reviewHTML = wrongs.length === 0 ? '' : `
    <div class="review-heading">Questions to revisit (${wrongs.length})</div>
    ${wrongs.map(r => `
      <div class="review-item">
        <div class="q-meta"><span class="section-badge">${r.s}</span></div>
        <div class="review-q">${r.q}</div>
        <div class="review-ans">
          <div class="wrong-line">✗ Your answer: ${r.your}</div>
          <div class="right-line">✓ Correct: ${r.right}</div>
          <div class="explain-line">${r.ex}</div>
        </div>
      </div>`).join('')}`;
  root.innerHTML = `
    <div class="score-screen">
      <div class="score-dial">
        <div class="score-num">${score}/${Q.length}</div>
        <div class="score-denom">${p}%</div>
      </div>
      <div class="score-title">${p === 100 ? 'Full Marks!' : p >= 75 ? 'Well Played' : p >= 50 ? 'Good Effort' : 'Keep Studying'}</div>
      <div class="score-msg">${msg}</div>
      ${reviewHTML}
      <button class="btn-retry" onclick="restart()">Try Again</button>
    </div>`;
}

function restart() {
  cur = 0; score = 0; answered = false; results = []; Q = [];
  renderStart();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderStart();

</script>
</body>
</html>
